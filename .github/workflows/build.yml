name: Build GeminiBoard IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Package IPA
    runs-on: macos-15

    steps:

    # ── 1. Checkout ─────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── 2. Select Xcode ─────────────────────────────────────────
    - name: Select Xcode
      run: |
        # Find available Xcode versions and pick the latest
        ls /Applications/ | grep Xcode
        XCODE=$(ls /Applications/ | grep "^Xcode" | sort -r | head -1)
        echo "Using: $XCODE"
        sudo xcode-select -s "/Applications/$XCODE/Contents/Developer"
        xcodebuild -version
        xcodebuild -showsdks | grep iphoneos

    # ── 3. Install XcodeGen ─────────────────────────────────────
    - name: Install XcodeGen
      run: |
        HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen

    # ── 4. Generate Xcode project ───────────────────────────────
    - name: Generate Xcode project
      run: xcodegen generate --spec project.yml

    # ── 5. Build & Archive ──────────────────────────────────────
    - name: Build Archive
      run: |
        # Get the installed iOS SDK version
        SDK=$(xcodebuild -showsdks | grep iphoneos | awk '{print $NF}' | head -1)
        echo "Using SDK: $SDK"

        xcodebuild \
          -project GeminiBoard.xcodeproj \
          -scheme GeminiBoard \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath "$RUNNER_TEMP/GeminiBoard.xcarchive" \
          -sdk "$SDK" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM="" \
          IPHONEOS_DEPLOYMENT_TARGET=15.0 \
          archive

    # ── 6. Package IPA ──────────────────────────────────────────
    - name: Package IPA
      run: |
        APP_PATH=$(find "$RUNNER_TEMP/GeminiBoard.xcarchive/Products" -name "*.app" | head -1)
        echo "Found app at: $APP_PATH"
        mkdir -p "$RUNNER_TEMP/Payload"
        cp -R "$APP_PATH" "$RUNNER_TEMP/Payload/"
        cd "$RUNNER_TEMP"
        zip -qr GeminiBoard.ipa Payload/
        ls -lh GeminiBoard.ipa

    # ── 7. Upload IPA artifact ───────────────────────────────────
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: GeminiBoard-IPA
        path: ${{ runner.temp }}/GeminiBoard.ipa
        retention-days: 30

    # ── 8. Summary ───────────────────────────────────────────────
    - name: Build Summary
      run: |
        echo "## ✅ GeminiBoard IPA Built!" >> $GITHUB_STEP_SUMMARY
        echo "Download the **GeminiBoard-IPA** artifact below, extract it, and install via **TrollStore**." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "1. Open **GeminiBoard** app → enter your Gemini API key" >> $GITHUB_STEP_SUMMARY
        echo "2. Settings → General → Keyboard → Add GeminiBoard → Allow Full Access ✓" >> $GITHUB_STEP_SUMMARY
